# Prefix
unbind C-b
set-option -g prefix C-z
bind C-z send-prefix

# option
set-option -g buffer-limit 20
set-option -g history-limit 100000
set-option -g default-shell /bin/zsh
set-option -g mouse on
set-option -gw mode-keys vi
set-option -gw allow-rename on
set-option -gw automatic-rename off
set-option -sg escape-time 10
set-option -g  focus-events on
set-option -g  default-terminal "tmux-256color"
set-option -sa terminal-overrides ",xterm*:Tc"
set-option -g  renumber-windows on
set-option -g  display-panes-time 10000

# key bind
unbind l
bind -r h select-pane -L
bind -r l select-pane -R
bind -r j select-pane -D
bind -r k select-pane -U

bind -r C-h select-pane -L
bind -r C-l select-pane -R
bind -r C-j select-pane -D
bind -r C-k select-pane -U

bind -r < resize-pane -L 1
bind -r > resize-pane -R 1
bind -r - resize-pane -D 1
bind -r + resize-pane -U 1
bind -r H resize-pane -L 5
bind -r L resize-pane -R 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5

bind    s   split-window -v
bind    v   split-window -h
bind    C-s split-window -v
bind    C-v split-window -h
bind    _   split-window -v
bind    |   split-window -h

unbind \;
unbind :
bind    \; command-prompt
bind    :  last-pane

bind    C-c new-window
bind    C-d detach-client
bind    C-f command-prompt "find-window '%%'"
bind    C-i display-message
bind -r n   next-window
bind -r C-n next-window
bind -r C-o select-pane -t :.+
bind    p   paste-buffer
bind -r C-p previous-window
bind    q   kill-window
bind    C-q kill-window
bind    C-r refresh-client
bind    C-t clock-mode
bind    C-w choose-window
bind    x   kill-pane
bind    C-x kill-pane
bind    y   copy-mode
bind    C-y copy-mode
bind    g   display-panes
bind    C-g display-panes
bind -T copy-mode-vi v send -X begin-selection
if-shell "uname | grep -q Darwin" {
    bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
} {
    if-shell "command -v wl-copy >/dev/null 2>&1" {
        bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"
    } {
        bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard"
    }
}
bind    C-z select-pane -t :.+

